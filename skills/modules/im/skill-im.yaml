    - module: "yudao-framework-redis"
      purpose: "Redis 操作封装，用于已读游标存储"
    - module: "yudao-framework-tenant"
      purpose: "租户支持"

  # 外部依赖（第三方库）
  external:
    - name: "MyBatis-Plus"
      purpose: "ORM 框架，提供 CRUD 封装"
