      entity: "AiKnowledgeDO"
      extends: "BaseDO"
      columns:
        - { name: "id", type: "Long", comment: "编号" }
        - { name: "name", type: "String", comment: "知识库名称" }
        - { name: "description", type: "String", comment: "知识库描述" }
        - { name: "embedding_model_id", type: "Long", comment: "向量模型编号" }
