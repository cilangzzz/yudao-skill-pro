# SQL 规范知识库

convention:
  id: "sql-convention"
  name: "SQL 文件规范"
  category: "开发规范"
  description: "定义项目 SQL 文件的目录结构、命名规范、编写规范，确保数据库脚本的统一管理和版本控制"

# 目录结构规范
directory_structure:
  base_path: "sql/master"
  description: "SQL 文件按功能和类型组织，支持版本化管理和增量更新"
  layout: |
    sql/master/
    ├── table/              # 表结构定义
    │   ├── create/         # 建表脚本
    │   └── update/         # 表结构更新脚本
    ├── seq/                # 序列定义（Oracle/PostgreSQL）
    ├── index/              # 索引定义
    ├── view/               # 视图定义
    ├── data/               # 初始数据
    └── init/               # 模块初始化脚本

  directories:
    - name: "table/create"
      purpose: "存放建表 SQL 脚本"
      note: "每个表一个文件，按日期命名"
    - name: "table/update"
      purpose: "存放表结构更新 SQL 脚本"
      note: "ALTER TABLE、ADD COLUMN 等增量变更"
    - name: "seq"
      purpose: "存放序列（Sequence）创建脚本"
      note: "Oracle/PostgreSQL 序列，MySQL 可省略"
    - name: "index"
      purpose: "存放索引创建脚本"
      note: "可按表名组织子目录"
    - name: "view"
      purpose: "存放视图创建脚本"
      note: "复杂查询可封装为视图"
    - name: "data"
      purpose: "存放初始数据 SQL 脚本"
      note: "INSERT 语句，初始化字典、菜单等"
    - name: "init"
      purpose: "存放模块初始化脚本"
      note: "按模块组织，如 bpm.sql, quartz.sql"

# 文件命名规范
naming_convention:
  # 建表文件命名
  create_table:
    format: "YYYY_MM_DD_表名_create.sql"
    examples:
      - "2025_08_09_fz_letter_create.sql"
      - "2025_08_10_fz_attachment_rel_create.sql"
      - "2025_10_16_fz_kpi_create.sql"
    rules:
      - "日期前缀使用实际创建日期"
      - "表名使用小写字母和下划线"
      - "统一使用 _create.sql 后缀"

  # 更新文件命名
  update_table:
    format: "YYYY_MM_DD_表名_update.sql"
    examples:
      - "2025_08_15_fz_metaletter_update.sql"
      - "2025_11_11_fz_letter_update.sql"
      - "2026_01_07_fz_attachment_rel_update.sql"
    rules:
      - "日期前缀使用实际更新日期"
      - "同一表多次更新使用不同日期"
      - "统一使用 _update.sql 后缀"
    special_cases:
      - pattern: "YYYY_MM_DD_表名_index_update.sql"
        purpose: "专门用于索引更新"
        example: "2026_02_07_fz_warning_sign_rel_index_update.sql"

  # 序列文件命名
  sequence:
    format: "YYYY_MM_DD_表名_seq_create.sql"
    examples:
      - "2025_07_24_fz_metaletter_seq_create.sql"
      - "2025_08_09_fz_letter_seq_create.sql"
    rules:
      - "与建表日期保持一致"
      - "序列名通常为 表名_seq"

  # 初始数据文件命名
  initial_data:
    format: "模块名.sql"
    examples:
      - "fazhi.sql"
      - "bpm.sql"
      - "quartz.sql"
    rules:
      - "按模块或功能命名"
      - "包含该模块的初始数据"

# 表命名规范
table_naming:
  # 表名前缀规范
  prefixes:
    - prefix: "sys_"
      usage: "系统核心表"
      examples: ["sys_user", "sys_role", "sys_menu", "sys_dict_data"]
    - prefix: "fz_"
      usage: "法制业务表"
      examples: ["fz_letter", "fz_replay", "fz_handle_unit"]
    - prefix: "bpm_"
      usage: "工作流表"
      examples: ["bpm_process_definition", "bpm_process_instance"]
    - prefix: "pay_"
      usage: "支付模块表"
      examples: ["pay_order", "pay_refund", "pay_channel"]
    - prefix: "member_"
      usage: "会员模块表"
      examples: ["member_user", "member_level", "member_address"]

  # 表名规则
  rules:
    - "使用小写字母，单词间用下划线分隔"
    - "使用名词，表示实体或关系"
    - "避免使用 MySQL 保留字"
    - "长度不超过 64 个字符"
    - "关联表命名：主表_关联表_rel，如 fz_letter_label_rel"

  # 字段命名规则
  column_rules:
    - "使用小写字母和下划线"
    - "布尔类型使用 is_ 前缀，如 is_deleted, is_enabled"
    - "时间类型使用 _time 或 _date 后缀"
    - "外键使用 关联表_id 格式，如 user_id, dept_id"
    - "主键统一命名为 id"

# 建表规范
create_table_standards:
  # 必需字段
  required_columns:
    - name: "id"
      type: "BIGINT"
      constraint: "PRIMARY KEY AUTO_INCREMENT"
      comment: "主键ID"
    - name: "creator"
      type: "VARCHAR(64)"
      default: "''"
      comment: "创建者"
    - name: "create_time"
      type: "DATETIME"
      default: "CURRENT_TIMESTAMP"
      comment: "创建时间"
    - name: "updater"
      type: "VARCHAR(64)"
      default: "''"
      comment: "更新者"
    - name: "update_time"
      type: "DATETIME"
      default: "CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP"
      comment: "更新时间"
    - name: "deleted"
      type: "BIT(1)"
      default: "b'0'"
      comment: "是否删除"
    - name: "tenant_id"
      type: "BIGINT"
      default: "0"
      comment: "租户编号（多租户场景）"

  # 建表模板
  template: |
    CREATE TABLE `表名` (
        `id` BIGINT NOT NULL AUTO_INCREMENT COMMENT '主键ID',
        -- 业务字段
        `name` VARCHAR(100) NOT NULL COMMENT '名称',
        `code` VARCHAR(50) NOT NULL COMMENT '编码',
        `status` TINYINT NOT NULL DEFAULT 0 COMMENT '状态（0正常 1停用）',
        `remark` VARCHAR(500) DEFAULT NULL COMMENT '备注',
        -- 通用字段
        `creator` VARCHAR(64) DEFAULT '' COMMENT '创建者',
        `create_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
        `updater` VARCHAR(64) DEFAULT '' COMMENT '更新者',
        `update_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP COMMENT '更新时间',
        `deleted` BIT(1) NOT NULL DEFAULT b'0' COMMENT '是否删除',
        `tenant_id` BIGINT NOT NULL DEFAULT 0 COMMENT '租户编号',
        PRIMARY KEY (`id`),
        KEY `idx_xxx` (`column_name`)  -- 普通索引
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci COMMENT='表注释';

  # 索引规范
  index_standards:
    naming:
      primary_key: "PRIMARY KEY 或 主键名"
      unique_key: "uk_字段名 或 uk_字段1_字段2"
      normal_index: "idx_字段名 或 idx_字段1_字段2"
    rules:
      - "外键字段必须建立索引"
      - "经常用于查询条件的字段建立索引"
      - "唯一约束字段建立唯一索引"
      - "组合索引注意字段顺序"
      - "避免过多索引，影响写入性能"

# 更新脚本规范
update_standards:
  # 增加字段
  add_column: |
    -- 新增字段
    ALTER TABLE `表名` ADD COLUMN `字段名` 数据类型 COMMENT '字段注释';
    -- 示例
    ALTER TABLE `fz_letter` ADD COLUMN `priority` TINYINT DEFAULT 0 COMMENT '优先级';

  # 修改字段
  modify_column: |
    -- 修改字段类型
    ALTER TABLE `表名` MODIFY COLUMN `字段名` 新数据类型 COMMENT '字段注释';
    -- 示例
    ALTER TABLE `fz_letter` MODIFY COLUMN `content` TEXT COMMENT '信件内容';

  # 删除字段（谨慎操作）
  drop_column: |
    -- 删除字段（确保无业务依赖）
    ALTER TABLE `表名` DROP COLUMN `字段名`;

  # 添加索引
  add_index: |
    -- 添加普通索引
    ALTER TABLE `表名` ADD INDEX `idx_字段名` (`字段名`);
    -- 添加唯一索引
    ALTER TABLE `表名` ADD UNIQUE INDEX `uk_字段名` (`字段名`);

  # 更新脚本注释规范
  comment_standards:
    - "文件头部说明更新目的"
    - "每个变更语句添加注释"
    - "危险操作（删除字段、删除数据）添加警告注释"

  update_template: |
    -- ============================================
    -- 更新说明：{更新目的}
    -- 更新日期：{YYYY-MM-DD}
    -- 更新人：{姓名}
    -- ============================================

    -- 新增 xxx 字段
    ALTER TABLE `fz_letter` ADD COLUMN `xxx` VARCHAR(100) DEFAULT NULL COMMENT 'xxx';

    -- 修改 xxx 字段
    ALTER TABLE `fz_letter` MODIFY COLUMN `xxx` TEXT COMMENT 'xxx';

# 数据初始化规范
data_standards:
  # INSERT 语句格式
  insert_format: |
    -- 插入菜单数据
    INSERT INTO `sys_menu` (`id`, `name`, `permission`, `type`, `sort`, `parent_id`, `path`, `icon`, `component`, `status`)
    VALUES
    (1001, '信件管理', '', 2, 1, 0, 'letter', 'ep:document', 'fazhi/letter/index', 0),
    (1002, '信件查询', 'fz:letter:query', 3, 1, 1001, '', '', '', 0);

  # 字典数据
  dict_data: |
    -- 字典类型
    INSERT INTO `sys_dict_type` (`name`, `type`, `status`, `remark`)
    VALUES ('信件状态', 'fz_letter_status', 0, '信件流转状态');

    -- 字典数据
    INSERT INTO `sys_dict_data` (`sort`, `label`, `value`, `dict_type`, `status`)
    VALUES
    (1, '待处理', '0', 'fz_letter_status', 0),
    (2, '处理中', '1', 'fz_letter_status', 0),
    (3, '已完成', '2', 'fz_letter_status', 0);

# 编写规范
coding_standards:
  # SQL 格式
  formatting:
    - "关键字使用大写：SELECT, FROM, WHERE, JOIN, ORDER BY"
    - "表名、字段名使用小写和反引号"
    - "每个字段占一行，逗号放在行尾"
    - "复杂查询使用缩进和换行提高可读性"

  # 注释规范
  comments:
    file_header: |
      -- ============================================
      -- 文件名：{文件名}
      -- 描述：{功能描述}
      -- 作者：{作者}
      -- 日期：{YYYY-MM-DD}
      -- ============================================
    table_comment: "CREATE TABLE 语句必须包含 COMMENT"
    column_comment: "每个字段必须包含 COMMENT"
    index_comment: "复杂索引添加注释说明用途"

  # 事务处理
  transaction:
    - "多条关联语句使用事务包裹"
    - "DDL 语句（部分数据库）自动提交，注意顺序"
    - "大数据量操作分批执行"

# 版本管理
version_control:
  # 文件更新原则
  principles:
    - "建表后表结构变更使用 update 脚本，不修改原文件"
    - "每个变更独立文件，便于追踪和回滚"
    - "日期前缀确保文件顺序和变更时间线"
    - "版本升级时按日期顺序执行所有脚本"

  # 变更记录
  change_log:
    format: |
      -- 变更记录：
      -- 2025-08-09：创建表
      -- 2025-11-11：新增 priority 字段
      -- 2026-01-07：新增 category 字段，添加索引

# 检查清单
checklist:
  before_create:
    - "确认表名符合命名规范"
    - "确认包含所有必需字段"
    - "确认字段类型和长度合理"
    - "确认添加了必要的索引"
    - "确认添加了表注释和字段注释"
    - "确认文件命名符合规范"

  after_create:
    - "测试建表脚本可正常执行"
    - "检查索引是否生效"
    - "更新相关文档"
    - "通知团队成员"

  before_update:
    - "确认变更的必要性"
    - "评估对现有数据的影响"
    - "准备回滚方案"
    - "选择低峰期执行"

# 快速参考
quick_reference:
  table_prefixes:
    sys_: "系统表"
    fz_: "法制业务表"
    bpm_: "工作流表"
    pay_: "支付表"
    member_: "会员表"

  file_suffixes:
    _create.sql: "建表脚本"
    _update.sql: "更新脚本"
    _seq_create.sql: "序列脚本"

  common_columns:
    id: "主键ID（BIGINT）"
    creator: "创建者（VARCHAR(64)）"
    create_time: "创建时间（DATETIME）"
    updater: "更新者（VARCHAR(64)）"
    update_time: "更新时间（DATETIME）"
    deleted: "逻辑删除（BIT）"
    tenant_id: "租户编号（BIGINT）"